name: release

# Builds a static, fully self-contained Linux binary on every `v*` tag and
# attaches it to the corresponding Forgejo/Codeberg release. The binary is
# linked against musl, so it runs on any Linux — including minimal images that
# lack a C compiler or a matching glibc. (The C compiler that `ring` needs is a
# build-time-only concern here; end users just download and run.)

on:
  push:
    tags:
      - 'v*'

jobs:
  linux-musl:
    # Codeberg's shared runners are labelled by size (tiny/small/medium), and
    # only the `-lazy` variants get scheduled. `medium-lazy` proved so
    # oversubscribed that a release job sat queued for hours, so we use
    # `small-lazy` — it turns jobs around promptly and handles this compile
    # fine. Change this when self-hosted.
    runs-on: codeberg-small-lazy
    container:
      # The JS actions below (checkout, forgejo-release) are executed with the
      # container's own `node` — a bare `rust` image has none and fails at exit
      # 127. The full node:*-bookworm image is buildpack-deps-based, so it also
      # ships gcc (needed to compile `ring`) and curl. Rust is installed via
      # rustup below rather than baked into the image.
      image: node:20-bookworm

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install Rust + musl toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends musl-tools
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain 1.86.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" target add x86_64-unknown-linux-musl

      - name: Build (static, x86_64 musl)
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/sec-mcp dist/sec-mcp
          cd dist
          tar -czf "sec-mcp-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl.tar.gz" sec-mcp
          rm sec-mcp
          sha256sum *.tar.gz > SHA256SUMS

      - name: Publish to release
        # Pin to a commit SHA once you've vetted a release — a moving `@v2` tag
        # is a supply-chain surface.
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          release-dir: dist
          tag: ${{ github.ref_name }}
          # Forgejo injects this automatic per-run token — no PAT/secret needed.
          # If the publish step 403s, swap in a `write:repository` PAT stored as
          # a secret: token: ${{ secrets.FORGEJO_TOKEN }}
          token: ${{ github.token }}
