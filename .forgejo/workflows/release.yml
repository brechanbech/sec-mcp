name: release

# Builds self-contained release binaries on every `v*` tag and attaches them to
# the Forgejo/Codeberg release:
#   - Linux:   x86_64-unknown-linux-musl (static — no C compiler or glibc needed)
#   - Windows: x86_64-pc-windows-msvc    (cross-compiled from Linux via cargo-xwin)
# End users just download and run; every build-time toolchain stays in CI.

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # Codeberg's shared runners are labelled by size (tiny/small/medium), and
    # only the `-lazy` variants get scheduled. `medium-lazy` proved so
    # oversubscribed that a release job sat queued for hours, so we use
    # `small-lazy` — it turns jobs around promptly. Change this when self-hosted.
    runs-on: codeberg-small-lazy
    container:
      # The JS actions below (checkout, forgejo-release) are executed with the
      # container's own `node` — a bare `rust` image has none and fails at exit
      # 127. The full node:*-bookworm image is buildpack-deps-based, so it also
      # ships gcc and curl. Rust and the cross toolchains are installed below.
      image: node:20-bookworm
    env:
      # cargo-xwin fetches the Microsoft CRT to link the windows-msvc target;
      # accept its licence non-interactively.
      XWIN_ACCEPT_LICENSE: '1'

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install toolchains
        run: |
          apt-get update
          # musl-tools: static Linux build. clang/lld: the MSVC-style compiler
          # and linker cargo-xwin drives. nasm: ring's Windows asm is NASM-format.
          # zip: Windows artifact packaging.
          apt-get install -y --no-install-recommends \
            musl-tools clang lld llvm nasm zip
          # `stable` (not the 1.86 MSRV floor) so `cargo install cargo-xwin` —
          # which may want a newer rustc than 1.86 — always compiles; a release
          # build has no reason to pin to the minimum.
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" target add \
            x86_64-unknown-linux-musl x86_64-pc-windows-msvc

      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked

      - name: Build Linux (static, x86_64 musl)
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Build Windows (x86_64-pc-windows-msvc)
        run: cargo xwin build --release --locked --target x86_64-pc-windows-msvc

      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/sec-mcp  dist/sec-mcp
          cp target/x86_64-pc-windows-msvc/release/sec-mcp.exe dist/sec-mcp.exe
          cd dist
          tar -czf "sec-mcp-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl.tar.gz" sec-mcp
          zip -q   "sec-mcp-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.zip"       sec-mcp.exe
          rm sec-mcp sec-mcp.exe
          sha256sum sec-mcp-*.tar.gz sec-mcp-*.zip > SHA256SUMS

      - name: Publish to release
        # Pin to a commit SHA once you've vetted a release — a moving `@v2` tag
        # is a supply-chain surface.
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          release-dir: dist
          tag: ${{ github.ref_name }}
          # Forgejo injects this automatic per-run token — no PAT/secret needed.
          token: ${{ github.token }}
